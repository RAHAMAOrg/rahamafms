<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAHAMA Project Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="icon" type="image/png" href="RAHAMA Empowerment Logo Design (3).png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Archivo:wght@600;700&display=swap');

        :root {
            --primary: #059669;
            --primary-dark: #047857;
            --primary-light: #10b981;
            --danger: #D32F2F;
            --warning: #F57C00;
            --success: #059669;
            --bg: #F5F7FA;
            --surface: #FFFFFF;
            --text: #1A1A1A;
            --text-muted: #616161;
            --border: #E0E0E0;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
            --dark: #1E4D2B;
            --mid: #2E7D47;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }

        .app { display: grid; grid-template-columns: 260px 1fr; min-height: 100vh; }

        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 24px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            padding: 0 24px 20px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
            text-align: center;
        }

        .logo img { width: 64px; height: 64px; object-fit: contain; margin-bottom: 8px; }
        .logo h1 { font-family: 'Archivo', sans-serif; font-size: 16px; font-weight: 700; color: var(--primary); }
        .logo p { font-size: 11px; color: var(--text-muted); }

        .user-card {
            margin: 0 16px 20px;
            padding: 12px 16px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            font-size: 13px;
        }
        .user-card .name { font-weight: 700; color: var(--text); }
        .role-badge {
            display: inline-block;
            margin-top: 4px;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .role-editor { background: #E8F5E9; color: var(--success); }
        .role-viewer { background: #E3F2FD; color: #1976D2; }

        .nav { list-style: none; }
        .nav button {
            width: 100%;
            padding: 11px 24px;
            text-align: left;
            background: none;
            border: none;
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            color: var(--text);
            transition: all 0.2s;
            position: relative;
            font-family: 'DM Sans', sans-serif;
        }
        .nav button:hover { background: var(--bg); color: var(--primary); }
        .nav button.active {
            background: linear-gradient(90deg, rgba(5,150,105,0.1) 0%, transparent 100%);
            color: var(--primary);
            font-weight: 600;
        }
        .nav button.active::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--primary);
        }

        .portal-link {
            margin: 20px 16px 0;
            padding: 11px;
            background: linear-gradient(135deg, #059669, #047857);
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
        }
        .portal-link:hover { background: linear-gradient(135deg, #047857, #065f46); transform: translateY(-1px); }

        .main {
            padding: 32px 40px;
            max-width: 1400px;
            overflow-x: auto;
        }

        .page-header { margin-bottom: 28px; }
        .page-header h2 { font-family: 'Archivo', sans-serif; font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
        .page-header p { color: var(--text-muted); font-size: 14px; }

        .alert-banner {
            padding: 14px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .alert-banner.critical { background: #FFEBEE; border: 1px solid #FFCDD2; color: var(--danger); }
        .alert-banner.warning  { background: #FFF3E0; border: 1px solid #FFE0B2; color: var(--warning); }

        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
        .metric-card { padding: 20px; border-radius: 12px; color: white; }
        .metric-card .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.8; margin-bottom: 6px; }
        .metric-card .value { font-size: 22px; font-weight: 800; font-family: 'Archivo', sans-serif; line-height: 1.2; }
        .metric-card.green { background: var(--dark); }
        .metric-card.mid   { background: var(--mid); }
        .metric-card.red   { background: #8B1A1A; }

        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            white-space: nowrap;
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            color: var(--dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--dark);
        }

        .table-wrap {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            overflow-x: auto;
            margin-bottom: 28px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead tr { background: var(--mid); }
        th { color: white; padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; white-space: nowrap; }
        td { padding: 10px 12px; border-top: 1px solid var(--border); vertical-align: top; }
        tr:nth-child(even) td { background: #f9fdf9; }
        tr:hover td { background: #f0faf4; }
        tfoot tr { background: var(--dark); }
        tfoot td { color: white; font-weight: 700; padding: 10px 12px; border-top: none; background: transparent; }

        .td-project { max-width: 260px; line-height: 1.4; }
        .td-note { max-width: 200px; font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .td-warn { background: #FFEBEE !important; color: #721C24; font-weight: 700; }

        .modal-backdrop {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
        }
        .modal {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
        }
        .modal-header {
            background: var(--dark);
            padding: 16px 24px;
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .modal-header span { color: white; font-weight: 700; font-size: 15px; font-family: 'Archivo', sans-serif; }
        .modal-header button { background: transparent; border: none; color: white; font-size: 24px; cursor: pointer; line-height: 1; }
        .modal-body { padding: 24px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-full { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 11px; font-weight: 700; color: var(--dark); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 8px 12px;
            border: 1.5px solid #ccc;
            border-radius: 6px;
            font-size: 13px;
            font-family: inherit;
            background: white;
            transition: border-color 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus { outline: none; border-color: var(--primary); }
        .form-group textarea { min-height: 72px; resize: vertical; }
        .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

        .btn { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; font-family: 'DM Sans', sans-serif; transition: all 0.2s; }
        .btn-primary { background: var(--dark); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-secondary { background: white; color: var(--text); border: 1.5px solid #ccc; }
        .btn-secondary:hover { background: var(--bg); }
        .btn-add { background: var(--dark); color: white; padding: 7px 16px; font-size: 12px; font-weight: 700; border: none; border-radius: 6px; cursor: pointer; }
        .btn-edit { background: transparent; border: none; color: var(--mid); cursor: pointer; font-size: 12px; font-weight: 600; padding: 2px 6px; }
        .btn-del  { background: transparent; border: none; color: #8B1A1A; cursor: pointer; font-size: 12px; font-weight: 600; padding: 2px 6px; }
        .btn-edit:hover, .btn-del:hover { text-decoration: underline; }

        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }

        .access-denied {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 60vh; text-align: center; color: var(--text-muted);
        }
        .access-denied .icon { font-size: 64px; margin-bottom: 16px; }
        .access-denied h2 { font-family: 'Archivo', sans-serif; color: var(--text); margin-bottom: 8px; }

        .loading { text-align: center; padding: 64px; }
        .spinner { font-size: 32px; color: var(--primary); display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .rcv-critical td { background: #FFF0F0 !important; }
        .rcv-pending  td { background: #FFFBEA !important; }

        .chip { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; margin: 2px; }

        @media (max-width: 900px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { height: auto; position: relative; }
            .main { padding: 16px; }
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="logo">
            <img src="RAHAMA Empowerment Logo Design (3).png" alt="RAHAMA" onerror="this.style.display='none'">
            <h1>Project Tracker</h1>
            <p>2025 – 2026</p>
        </div>
        <div class="user-card" id="userCard">
            <div class="name" id="userName">Loading…</div>
            <span class="role-badge" id="userRoleBadge">–</span>
        </div>
        <ul class="nav">
            <li><button onclick="showTab('dashboard')"    data-tab="dashboard"    class="active">📊 Dashboard</button></li>
            <li><button onclick="showTab('p2025')"        data-tab="p2025">📋 2025 Pipeline</button></li>
            <li><button onclick="showTab('b2025')"        data-tab="b2025">💰 2025 Budgets</button></li>
            <li><button onclick="showTab('ag2026')"       data-tab="ag2026">✅ 2026 Active Grants</button></li>
            <li><button onclick="showTab('p2026')"        data-tab="p2026">🔭 2026 Pipeline</button></li>
            <li><button onclick="showTab('receivables')"  data-tab="receivables">⚠ Receivables</button></li>
            <li><button onclick="showTab('unsuccessful')" data-tab="unsuccessful">❌ Unsuccessful</button></li>
        </ul>
        <a href="index.html" class="portal-link">← Back to Portal</a>
    </aside>

    <main class="main" id="mainContent">
        <div class="loading"><span class="spinner">⟳</span><p style="margin-top:16px;color:var(--text-muted)">Loading tracker…</p></div>
    </main>
</div>

<div id="modalContainer"></div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SUPABASE_URL = 'https://sqygmoxpegbfxddglhbx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNxeWdtb3hwZWdiZnhkZGdsaGJ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA5OTYzNTcsImV4cCI6MjA4NjU3MjM1N30.Oi3Vhw4q4F58cyb1yhJ90fcjGIVNwp34CqMtfxswkr8';

// ── ACCESS CONTROL ──────────────────────────────────────
// Session comes from the appraisal portal which stores:
// { email, name, role: 'employee'|'supervisor', id }
// All supervisors get access. Specific employees below also get access.
const AUTHORIZED_EMPLOYEE_EMAILS = [
    'salahuddeen.sambo@rgcweinigeria.org',
    'sani.hamisu@rgcweinigeria.org',
    'aisha.abdulrahman@rgcweinigeria.org',
    'maryam.tijjani@rgcweinigeria.org',
];

const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let STATE = {
    user: null,
    canEdit: false,
    tab: 'dashboard',
    data: {
        pipeline2025: [],
        budgets2025: [],
        activeGrants2026: [],
        pipeline2026: [],
        receivables: [],
        unsuccessful: []
    }
};

// ═══════════════════════════════════════════════════════
// INIT — FIX: check name OR email OR role, with full error handling
// ═══════════════════════════════════════════════════════
async function init() {
    const raw = localStorage.getItem('pms_user');
    if (!raw) {
        showAccessDenied('no-session');
        return;
    }

    let session;
    try {
        session = JSON.parse(raw);
    } catch (e) {
        showAccessDenied('no-session');
        return;
    }

    const name  = (session.name  || '').trim();
    const email = (session.email || '').toLowerCase().trim();
    const role  = (session.role  || '').toLowerCase().trim();

    // Appraisal portal sets role as 'supervisor' or 'employee'
    // All supervisors get full access; specific employees also get access
    const isSupervisor    = role === 'supervisor';
    const isAuthorizedEmp = AUTHORIZED_EMPLOYEE_EMAILS.includes(email);

    if (!isSupervisor && !isAuthorizedEmp) {
        showAccessDenied('no-access');
        return;
    }

    STATE.user    = session;
    STATE.canEdit = true;

    document.getElementById('userName').textContent = name || email || 'User';
    const badge = document.getElementById('userRoleBadge');
    badge.textContent = 'Editor';
    badge.className = 'role-badge role-editor';

    // ── FIX: wrap loadAllData in try/catch so errors show instead of freezing ──
    try {
        await loadAllData();
    } catch (err) {
        console.error('Data load error:', err);
        document.getElementById('mainContent').innerHTML = `
            <div class="access-denied">
                <div class="icon">⚠️</div>
                <h2>Could not load tracker data</h2>
                <p style="margin-top:8px;max-width:400px">${err.message || 'A network or database error occurred. Please check your connection and try again.'}</p>
                <br>
                <button onclick="init()" class="btn btn-primary" style="margin-top:8px">Retry</button>
            </div>`;
        return;
    }

    showTab('dashboard');
}

// ═══════════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════════
async function loadAllData() {
    const tables = ['pipeline2025', 'budgets2025', 'active_grants_2026', 'pipeline2026', 'receivables', 'unsuccessful'];
    const keys   = ['pipeline2025', 'budgets2025', 'activeGrants2026',   'pipeline2026', 'receivables', 'unsuccessful'];

    const results = await Promise.all(
        tables.map(t => db.from(t).select('*').order('id', { ascending: true }))
    );

    results.forEach((res, i) => {
        if (res.error) {
            console.warn(`Table '${tables[i]}' error:`, res.error.message);
        }
        if (res.data) STATE.data[keys[i]] = res.data;
    });
}

// ═══════════════════════════════════════════════════════
// TAB ROUTING
// ═══════════════════════════════════════════════════════
function showTab(tab) {
    STATE.tab = tab;
    document.querySelectorAll('.nav button').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
    });
    const main = document.getElementById('mainContent');
    switch (tab) {
        case 'dashboard':    renderDashboard(main);  break;
        case 'p2025':        renderPipeline(main, 'pipeline2025', '2025 Pipeline Tracker'); break;
        case 'b2025':        renderBudgets(main);    break;
        case 'ag2026':       renderActiveGrants(main); break;
        case 'p2026':        renderPipeline(main, 'pipeline2026', '2026 Pipeline Tracker'); break;
        case 'receivables':  renderReceivables(main); break;
        case 'unsuccessful': renderUnsuccessful(main); break;
    }
}

// ═══════════════════════════════════════════════════════
// ACCESS DENIED
// ═══════════════════════════════════════════════════════
function showAccessDenied(reason) {
    document.getElementById('userName').textContent = 'Not signed in';
    const badge = document.getElementById('userRoleBadge');
    badge.textContent = 'No Access';
    badge.className = 'role-badge role-viewer';

    const main = document.getElementById('mainContent');
    if (reason === 'no-session') {
        main.innerHTML = `
            <div class="access-denied">
                <div class="icon">🔐</div>
                <h2>Please sign in first</h2>
                <p>You need to log in through the FMS portal to access this tracker.</p>
                <br>
                <a href="index.html" style="background:var(--dark);color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700;">
                    Go to Portal
                </a>
            </div>`;
    } else {
        main.innerHTML = `
            <div class="access-denied">
                <div class="icon">🚫</div>
                <h2>Access Restricted</h2>
                <p>The Project Tracker is only available to authorised staff.</p>
                <p style="margin-top:8px;">Please contact the Executive Director if you need access.</p>
                <br>
                <a href="index.html" style="background:var(--dark);color:white;padding:10px 24px;border-radius:8px;text-decoration:none;font-weight:700;">
                    ← Back to Portal
                </a>
            </div>`;
    }
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const fmtUSD = n => n != null ? '$' + Number(n).toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2}) : '–';
const fmtNGN = n => n != null ? '₦' + Number(n).toLocaleString('en-NG', {minimumFractionDigits:2, maximumFractionDigits:2}) : '–';
const pct    = n => (n != null ? (n * 100).toFixed(0) + '%' : '–');
const symOf  = c => c === 'EUR' ? '€' : c === 'NGN' ? '₦' : '$';
const esc    = s => (s || '').toString().replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

const STATUS_META = {
    'Awarded':            { bg: '#D4EDDA', fg: '#155724' },
    'Active':             { bg: '#D4EDDA', fg: '#1E4D2B' },
    'Awaiting Outcome':   { bg: '#FFF3CD', fg: '#856404' },
    'Not Awarded':        { bg: '#F8D7DA', fg: '#721C24' },
    'Not Submitted':      { bg: '#E8F4F8', fg: '#0C5460' },
    'Submitted':          { bg: '#E8F0FE', fg: '#1a3c8f' },
    'Closed':             { bg: '#E2E3E5', fg: '#383D41' },
    'On Hold':            { bg: '#E2E3E5', fg: '#555555' },
    'Overdue / Pending':  { bg: '#FFF3CD', fg: '#856404' },
    'Overdue / CRITICAL': { bg: '#F8D7DA', fg: '#8B1A1A' },
};

function badge(status) {
    const m = STATUS_META[status] || { bg: '#eee', fg: '#333' };
    return `<span class="badge" style="background:${m.bg};color:${m.fg}">${esc(status)}</span>`;
}

function editBtn(onclick) {
    return STATE.canEdit ? `<button class="btn-edit" onclick="${onclick}">✏</button>` : '';
}
function delBtn(onclick) {
    return STATE.canEdit ? `<button class="btn-del" onclick="${onclick}">✕</button>` : '';
}
function addBtn(label, onclick) {
    return STATE.canEdit ? `<button class="btn-add" onclick="${onclick}">${label}</button>` : '';
}

// ═══════════════════════════════════════════════════════
// DASHBOARD  ← FIX: removed \` syntax error, fixed ] typo
// ═══════════════════════════════════════════════════════
function renderDashboard(el) {
    const p25 = STATE.data.pipeline2025;
    const b25 = STATE.data.budgets2025;
    const ag  = STATE.data.activeGrants2026;
    const p26 = STATE.data.pipeline2026;
    const rcv = STATE.data.receivables;

    const p25Total    = p25.reduce((s, p) => s + (p.amount  || 0), 0);
    const p25Weighted = p25.reduce((s, p) => s + (p.amount  || 0) * (p.prob || 0), 0);
    const p25Awarded  = p25.filter(p => p.status === 'Awarded').reduce((s, p) => s + (p.amount || 0), 0);
    const b25Total    = b25.reduce((s, b) => s + (b.ngn     || 0), 0);
    const ag26Usd     = ag.reduce((s, g)  => s + (g.total_usd || 0), 0);
    const ag26Ngn     = ag.reduce((s, g)  => s + (g.total_ngn || 0), 0);
    const p26Weighted = p26.reduce((s, p) => s + (p.amount  || 0) * (p.prob || 0), 0);
    const outUsd      = rcv.reduce((s, r) => s + (r.amount_usd || 0), 0);
    const outNgn      = rcv.reduce((s, r) => s + (r.amount_ngn || 0), 0);
    const hasCritical = rcv.some(r => r.priority === 'CRITICAL');

    const statusChips = (arr) => {
        const counts = {};
        arr.forEach(p => { counts[p.status] = (counts[p.status] || 0) + 1; });

function openModal(title, bodyHTML) {
    document.getElementById('modalContainer').innerHTML = `
        <div class="modal-backdrop" onclick="closeModalIfBackdrop(event)">
            <div class="modal">
                <div class="modal-header">
                    <span>${title}</span>
                    <button onclick="closeModal()">×</button>
                </div>
                <div class="modal-body">${bodyHTML}</div>
            </div>
        </div>`;
}
function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
function closeModalIfBackdrop(e) { if (e.target.classList.contains('modal-backdrop')) closeModal(); }

// ── Field helpers ──
const inp = (name, label, val, type, extra) =>
    '<div class="form-group"><label>' + label + '</label><input name="' + name + '" type="' + (type||'text') + '" value="' + esc(val||'') + '" ' + (extra||'') + '></div>';
const sel = (name, label, val, opts) =>
    '<div class="form-group"><label>' + label + '</label><select name="' + name + '">' + opts.map(o => '<option value="' + o + '"' + (o===val?' selected':'') + '>' + o + '</option>').join('') + '</select></div>';
const ta  = (name, label, val, extra) =>
    '<div class="form-group form-full"><label>' + label + '</label><textarea name="' + name + '" ' + (extra||'') + '>' + esc(val||'') + '</textarea></div>';

const PIPELINE_STATUSES = ['Not Submitted','Submitted','Awaiting Outcome','Awarded','Not Awarded','On Hold'];
const STATUS_OPTIONS    = ['Awarded','Active','Awaiting Outcome','Not Awarded','Not Submitted','Submitted','Closed','On Hold'];
const RCVBL_STATUSES    = ['Overdue / Pending','Overdue / CRITICAL','Paid','Partially Paid'];

function openPipelineModal(tableKey, id) {
    const item  = id ? STATE.data[tableKey].find(x => x.id === id) : null;
    const title = item ? 'Edit Pipeline Entry' : 'Add Pipeline Entry';
    const body  = '<form class="form-grid" onsubmit="savePipeline(event,\'' + tableKey + '\',' + (id||'null') + ')">'
        + ta('project','Project Title', item && item.project, 'required')
        + inp('funder','Funder', item && item.funder, 'text', 'required')
        + inp('thematic','Thematic Area', item && item.thematic)
        + inp('geo','Geography', item && item.geo)
        + inp('amount','Grant Amount', item && item.amount, 'number')
        + sel('currency','Currency', (item && item.currency) || 'USD', ['USD','EUR','NGN','GBP'])
        + inp('prob','Probability (0–1)', item && item.prob, 'number')
        + inp('deadline','Deadline / Quarter', item && item.deadline)
        + sel('status','Status', (item && item.status) || 'Not Submitted', PIPELINE_STATUSES)
        + ta('note','Notes / Outcome', item && item.note)
        + '<div class="form-actions form-full"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>'
        + '</form>';
    openModal(title, body);
}

async function savePipeline(e, tableKey, id) {
    e.preventDefault();
    const fd  = new FormData(e.target);
    const row = {
        project:  fd.get('project'),
        funder:   fd.get('funder'),
        thematic: fd.get('thematic'),
        geo:      fd.get('geo'),
        amount:   parseFloat(fd.get('amount')) || 0,
        currency: fd.get('currency'),
        prob:     parseFloat(fd.get('prob'))   || 0,
        deadline: fd.get('deadline'),
        status:   fd.get('status'),
        note:     fd.get('note'),
    };
    await upsertRow(tableKey, id, row);
    closeModal();
    await loadAllData();
    showTab(STATE.tab);
}

        + inp('funder','Funder', item && item.funder)
        + inp('amount_usd','Amount (USD)', item && item.amount_usd, 'number')
        + inp('amount_ngn','Amount (NGN)', item && item.amount_ngn, 'number')
        + inp('due','Due Date', item && item.due)
        + sel('status','Status', (item && item.status) || 'Overdue / Pending', RCVBL_STATUSES)
        + sel('priority','Priority', (item && item.priority) || 'HIGH', ['CRITICAL','HIGH','MEDIUM','LOW'])
        + inp('owner','Action Owner', item && item.owner)
        + inp('target','Target Date', item && item.target)
        + ta('action','Required Action', item && item.action)
        + '<div class="form-actions form-full"><button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>'
        + '</form>';
    openModal(id ? 'Edit Receivable' : 'Add Receivable', body);
}

async function saveReceivable(e, id) {
    e.preventDefault();
    const fd  = new FormData(e.target);
    const num = k => { const v = parseFloat(fd.get(k)); return isNaN(v) ? null : v; };
    const row = {
        grant_name: fd.get('grant_name'), funder: fd.get('funder'),
        amount_usd: num('amount_usd'), amount_ngn: num('amount_ngn'),
        due: fd.get('due'), status: fd.get('status'), priority: fd.get('priority'),
        owner: fd.get('owner'), target: fd.get('target'), action: fd.get('action'),
    };
    await upsertRow('receivables', id, row);
    closeModal(); await loadAllData(); showTab(STATE.tab);
}

async function saveUnsuccessful(e, id) {
    e.preventDefault();

        year: fd.get('year'), funder: fd.get('funder'), project: fd.get('project'),

// ═══════════════════════════════════════════════════════
// DB OPERATIONS
// ═══════════════════════════════════════════════════════
async function upsertRow(table, id, row) {
    let res;
    if (id) {
        res = await db.from(table).update(row).eq('id', id);
    } else {
        res = await db.from(table).insert([row]);
    }
    if (res.error) {
        alert('Error saving to database: ' + res.error.message);
        throw res.error;
    }
}

async function deleteRow(table, id) {
    if (!confirm('Delete this entry? This cannot be undone.')) return;
    const { error } = await db.from(table).delete().eq('id', id);
    if (error) { alert('Error deleting: ' + error.message); return; }
    await loadAllData();
    showTab(STATE.tab);
}

// ═══════════════════════════════════════════════════════
// EXCEL EXPORT
// ═══════════════════════════════════════════════════════
function exportToExcel() {
    const d  = STATE.data;
    const wb = XLSX.utils.book_new();

    const C = {
        greenDark: '1E4D2B', greenMid: '2E7D47', greenLight: 'D4EDDA',
        redDark: '8B1A1A', redLight: 'F8D7DA', goldLight: 'FFF3CD', goldDark: '856404',
        grey: 'E2E3E5', white: 'FFFFFF', black: '1A1A1A',
    };

    const hdrStyle = (bg) => ({
        font: { bold:true, sz:9, color:{rgb:'FFFFFF'}, name:'Arial' },
        fill: { fgColor:{rgb: bg||C.greenMid}, patternType:'solid' },
        alignment: { horizontal:'center', vertical:'center', wrapText:true },
    });
    const dataStyle = (bg, bold, color) => ({
        font: { sz:9, bold: bold||false, name:'Arial', color:{rgb: color||C.black} },
        fill: bg ? { fgColor:{rgb:bg}, patternType:'solid' } : { patternType:'none' },
        alignment: { vertical:'center', wrapText:true },
        border: { bottom:{style:'hair',color:{rgb:'DDDDDD'}} },
    });
    const totalStyle = () => ({
        font: { bold:true, sz:9, color:{rgb:'FFFFFF'}, name:'Arial' },
        fill: { fgColor:{rgb:C.greenDark}, patternType:'solid' },
        alignment: { horizontal:'right', vertical:'center' },
    });
    const sectionStyle = () => ({
        font: { bold:true, sz:9, color:{rgb:'FFFFFF'}, name:'Arial' },
        fill: { fgColor:{rgb:C.greenDark}, patternType:'solid' },
        alignment: { vertical:'center' },
    });

    function makeWS(title, headers, dataRows, colWidths, rowStyles, hdrBg) {
        const ws  = {};
        const all = [headers, ...dataRows];
        all.forEach((row, R) => {
            row.forEach((val, C2) => {
                const addr = XLSX.utils.encode_cell({r:R, c:C2});
                ws[addr]   = { v: val == null ? '' : val, t: typeof val === 'number' ? 'n' : 's' };
                if (R === 0) ws[addr].s = hdrStyle(hdrBg);
                else if (rowStyles[R-1] === 'total')   ws[addr].s = totalStyle();
                else if (rowStyles[R-1] === 'section') ws[addr].s = sectionStyle();
                else ws[addr].s = dataStyle(rowStyles[R-1] && rowStyles[R-1].bg, rowStyles[R-1] && rowStyles[R-1].bold, rowStyles[R-1] && rowStyles[R-1].color);
            });
        });
        ws['!ref']  = XLSX.utils.encode_range({s:{r:0,c:0}, e:{r:all.length-1, c:headers.length-1}});
        ws['!cols'] = colWidths.map(w => ({wch:w}));
        ws['!rows'] = all.map((_,i) => ({hpt: i===0 ? 22 : 18}));
        return ws;
    }

    const now = new Date();

    // 2025 Pipeline
    const p25H = ['#','Project Title','Funder','Thematic','Geography','Amount','Currency','Probability','Weighted','Deadline','Status','Notes'];
    const p25R = d.pipeline2025.map((p,i) => [p.sn||i+1, p.project, p.funder, p.thematic, p.geo, p.amount||0, p.currency, ((p.prob||0)*100).toFixed(0)+'%', Math.round((p.amount||0)*(p.prob||0)), p.deadline, p.status, p.note]);
    const p25Total = d.pipeline2025.reduce((s,p)=>s+(p.amount||0),0);
    const p25W     = d.pipeline2025.reduce((s,p)=>s+(p.amount||0)*(p.prob||0),0);
    p25R.push(['','','','','TOTAL', p25Total,'','', Math.round(p25W),'','','']);
    const p25S = d.pipeline2025.map(p => p.status==='Awarded' ? {bg:C.greenLight} : p.status==='Not Awarded' ? {bg:C.redLight} : p.status==='Awaiting Outcome' ? {bg:C.goldLight} : {});
    p25S.push('total');
    XLSX.utils.book_append_sheet(wb, makeWS('2025 Pipeline', p25H, p25R, [4,44,28,22,18,12,10,12,14,14,18,34], p25S), '2025 Pipeline');

    // 2025 Budgets
    const b25Total = d.budgets2025.reduce((s,b)=>s+(b.ngn||0),0);
    const b25H = ['Grant / Project','Funder','Period','Budget (NGN)','% Portfolio','Status into 2026'];
    const b25R = d.budgets2025.map(b => [b.name, b.funder, b.period, b.ngn||0, b25Total>0?((b.ngn/b25Total)*100).toFixed(1)+'%':'–', b.status]);
    b25R.push(['GRAND TOTAL','','', b25Total,'','']);
    const b25S = d.budgets2025.map(b => b.status==='Closed' ? {bg:C.grey} : {bg:C.greenLight});
    b25S.push('total');
    XLSX.utils.book_append_sheet(wb, makeWS('2025 Budgets', b25H, b25R, [36,32,14,18,16,22], b25S), '2025 Budgets');

    // 2026 Active Grants
    const agH = ['Grant Name','Funder','Thematic','Geography','Period','Total (USD)','Total (NGN)','Received (USD)','Outstanding (USD)','Outstanding (NGN)','Status','Notes'];
    const agR = d.activeGrants2026.map(g => [g.name, g.funder, g.thematic, g.geo, g.period, g.total_usd||'', g.total_ngn||'', g.received_usd||'', g.outstanding_usd||'', g.outstanding_ngn||'', g.status, g.note]);
    const agS = d.activeGrants2026.map(g => (g.outstanding_usd||g.outstanding_ngn) ? {bg:C.redLight,bold:true,color:C.redDark} : {bg:C.greenLight});
    XLSX.utils.book_append_sheet(wb, makeWS('2026 Active Grants', agH, agR, [36,30,24,20,16,14,16,14,16,16,14,38], agS), '2026 Active Grants');

    // 2026 Pipeline
    const p26H = ['#','Project Title','Funder','Thematic','Geography','Amount','Currency','Probability','Weighted','Deadline','Status','Notes'];
    const p26Total = d.pipeline2026.reduce((s,p)=>s+(p.amount||0),0);
    const p26W     = d.pipeline2026.reduce((s,p)=>s+(p.amount||0)*(p.prob||0),0);
    const p26R = d.pipeline2026.map((p,i) => [p.sn||i+1, p.project, p.funder, p.thematic, p.geo, p.amount||0, p.currency, ((p.prob||0)*100).toFixed(0)+'%', Math.round((p.amount||0)*(p.prob||0)), p.deadline, p.status, p.note]);
    p26R.push(['','','','','TOTAL', p26Total,'','', Math.round(p26W),'','','']);
    const p26S = d.pipeline2026.map(p => p.status==='Awarded' ? {bg:C.greenLight} : p.status==='Not Awarded' ? {bg:C.redLight} : p.status==='Awaiting Outcome' ? {bg:C.goldLight} : {});
    p26S.push('total');
    XLSX.utils.book_append_sheet(wb, makeWS('2026 Pipeline', p26H, p26R, [4,44,28,22,18,12,10,12,14,14,18,34], p26S), '2026 Pipeline');

    // Receivables
    const rcvH = ['Grant','Funder','Amount (USD)','Amount (NGN)','Due Date','Status','Priority','Action Required','Owner','Target Date'];
    const rcvR = d.receivables.map(r => [r.grant_name, r.funder, r.amount_usd||'', r.amount_ngn||'', r.due, r.status, r.priority, r.action, r.owner, r.target]);
    const rcvS = d.receivables.map(r => r.priority==='CRITICAL' ? {bg:C.redLight,bold:true,color:C.redDark} : {bg:C.goldLight,color:C.goldDark});
    XLSX.utils.book_append_sheet(wb, makeWS('Receivables', rcvH, rcvR, [28,28,14,16,16,18,12,38,18,14], rcvS, C.redDark), 'Receivables');

    // Unsuccessful
    const unH = ['Year','Project Title','Funder','Thematic','Geography','Amount (€/yr)','Period','Status','Lessons Learned','Re-submission Strategy'];
    const unR = d.unsuccessful.map(a => [a.year, a.project, a.funder, a.thematic, a.geo, a.amount_eur||'', a.years, a.status, a.lessons, a.strategy]);
    const unS = d.unsuccessful.map(() => ({bg:C.redLight}));
    XLSX.utils.book_append_sheet(wb, makeWS('Unsuccessful', unH, unR, [8,44,28,22,20,14,14,14,40,40], unS), 'Unsuccessful');

    XLSX.writeFile(wb, 'RAHAMA_Project_Tracker_' + now.toISOString().slice(0,10) + '.xlsx', {bookSST:false, cellStyles:true});
}
